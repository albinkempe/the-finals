<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSD Scoreboard</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="title">
            <img src="the_finals_logo.png" alt="The Finals logo" height="30px" class="the_finals_logo">
            <h1>HSD Scoreboard</h1>
        </div>
    </header>
        
    <main>
        <div class="chart-wrapper">
            <div id="loadingIndicator" class="loading-indicator">
                <div class="spinner"></div>
                <span>Loading data...</span>
            </div>
            <canvas id="rankChart"></canvas>
        </div>
        <div class="controls">
            <div class="view-buttons">
                <button id="btnScore" class="active" onclick="updateView('score')">Score View</button>
                <button id="btnRank" onclick="updateView('rank')">Rank View</button>
            </div>
            <select id="seasonSelect" title="Select season"></select>
        </div>
    </main>

    <footer>
        <a href="https://github.com/albinkempe/the-finals" target="_blank" rel="noopener noreferrer">GitHub</a>
    </footer>

    <script src="script.js"></script>
</body>

</html>
